name = "naftiko-apache-spark-sandbox"
main = "src/index.ts"
compatibility_date = "2026-05-06"
compatibility_flags = ["nodejs_compat"]

[[containers]]
class_name = "ApacheSparkSandboxContainer"
image = "./Dockerfile"
instance_type = "standard-1"
max_instances = 1

[[durable_objects.bindings]]
name = "APACHE_SPARK_SANDBOX"
class_name = "ApacheSparkSandboxContainer"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ApacheSparkSandboxContainer"]

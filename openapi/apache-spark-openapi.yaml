components:
  parameters:
    appId:
      name: appId
      in: path
      required: true
      description: |
        Application ID. On YARN cluster mode this is `{base-app-id}/{attempt-id}`.
      schema:
        type: string
    jobId:
      name: jobId
      in: path
      required: true
      schema:
        type: integer
    stageId:
      name: stageId
      in: path
      required: true
      schema:
        type: integer
    stageAttemptId:
      name: stageAttemptId
      in: path
      required: true
      schema:
        type: integer
    submissionId:
      name: submissionId
      in: path
      required: true
      description: Driver submission ID (e.g. driver-20231124153531-0000)
      schema:
        type: string
  schemas:
    ApplicationInfo:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        attempts:
          type: array
          items:
            $ref: '#/components/schemas/ApplicationAttempt'
    ApplicationAttempt:
      type: object
      properties:
        attemptId:
          type: string
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        lastUpdated:
          type: string
          format: date-time
        duration:
          type: integer
          description: Duration in milliseconds
        sparkUser:
          type: string
        completed:
          type: boolean
        appSparkVersion:
          type: string
        startTimeEpoch:
          type: integer
        endTimeEpoch:
          type: integer
        lastUpdatedEpoch:
          type: integer
    JobData:
      type: object
      properties:
        jobId:
          type: integer
        name:
          type: string
        description:
          type: string
        submissionTime:
          type: string
          format: date-time
        completionTime:
          type: string
          format: date-time
        stageIds:
          type: array
          items:
            type: integer
        jobGroup:
          type: string
        status:
          type: string
          enum:

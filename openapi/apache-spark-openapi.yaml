openapi: 3.1.0
info:
  title: Apache Spark REST API
  description: |
    Combined OpenAPI specification for Apache Spark's two built-in HTTP REST APIs:

    **1. Monitoring & Management API** — Exposes application, job, stage, executor, storage,
    streaming, SQL, and environment data as JSON. Available on the Spark UI (default port 4040)
    and the History Server (default port 18080) under `/api/v1`.

    **2. Job Submission API** — Allows programmatic submission, status polling, and killing of
    Spark applications on a standalone cluster. Available on the Spark master (default port 6066)
    under `/v1/submissions`. Must be enabled with `spark.master.rest.enabled=true`.

    > **Note:** Spark Connect (gRPC-based) is not covered here as it is not an HTTP REST API.
  version: 1.0.0
  contact:
    name: Apache Spark
    url: https://spark.apache.org
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
servers:
  - url: http://localhost:4040/api/v1
    description: Spark UI — running application (Monitoring API)
  - url: http://localhost:18080/api/v1
    description: Spark History Server (Monitoring API)
  - url: http://localhost:6066
    description: Spark Master — standalone cluster (Job Submission API)
tags:
  - name: Applications
    description: Spark application metadata, attempts, and event logs
  - name: Jobs
    description: Job-level monitoring data for a given application
  - name: Stages
    description: Stage-level monitoring, task lists, and task metric summaries
  - name: Executors
    description: Executor status, resource usage, and thread information
  - name: Storage
    description: RDD storage and caching details
  - name: Streaming
    description: Spark Streaming statistics, receivers, batches, and output operations
  - name: SQL
    description: SQL and DataFrame query execution details and plans
  - name: Environment
    description: Application runtime environment and Spark configuration
  - name: Version
    description: Spark version information
  - name: Submissions
    description: Standalone cluster job submission, status, and lifecycle management
paths:
  /applications:
    get:
      tags:
        - Applications
      summary: List all applications
      operationId: listApplications
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum:
              - completed
              - running
        - name: minDate
          in: query
          description: Earliest start date/time (ISO 8601 or yyyy-MM-dd)
          schema:
            type: string
        - name: maxDate
          in: query
          description: Latest start date/time
          schema:
            type: string
        - name: minEndDate
          in: query
          description: Earliest end date/time
          schema:
            type: string
        - name: maxEndDate
          in: query
          description: Latest end date/time
          schema:
            type: string
        - name: limit
          in: query
          description: Maximum number of applications to return
          schema:
            type: integer
      responses:
        '200':
          description: Array of applications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ApplicationInfo'
              examples:
                Default:
                  summary: Successful response
                  value:
                    - id: app-20250115120000-0001
                      name: SparkPi
                      attempts:
                        - attemptId: '1'
                          startTime: 2025-01-15T12:00:00.000GMT
                          endTime: 2025-01-15T12:05:30.000GMT
                          lastUpdated: 2025-01-15T12:05:30.000GMT

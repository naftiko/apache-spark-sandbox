              type: string
            scalaVersion:
              type: string
        sparkProperties:
          type: array
          items:
            type: array
            items:
              type: string
        hadoopProperties:
          type: array
          items:
            type: array
            items:
              type: string
        systemProperties:
          type: array
          items:
            type: array
            items:
              type: string
        metricsProperties:
          type: array
          items:
            type: array
            items:
              type: string
        classpathEntries:
          type: array
          items:
            type: array
            items:
              type: string
        resourceProfiles:
          type: array
          items:
            type: object
            additionalProperties: true
    CreateSubmissionRequest:
      type: object
      required:
        - action
        - appResource
        - clientSparkVersion
        - mainClass
        - sparkProperties
      properties:
        action:
          type: string
          enum:
            - CreateSubmissionRequest
          description: Must be "CreateSubmissionRequest"
        appResource:
          type: string
          description: Path or URI of the application JAR or Python file
          example: /home/user/my-app.jar
        clientSparkVersion:
          type: string
          description: Client-side Spark version
          example: 4.0.0
        mainClass:
          type: string
          description: Fully-qualified main class to run
          example: org.apache.spark.examples.SparkPi
        appArgs:
          type: array
          description: Command-line arguments passed to the application
          items:
            type: string
          example:
            - '100'
        sparkProperties:
          type: object
          description: Spark configuration key-value pairs
          additionalProperties:
            type: string
          example:
            spark.master: spark://master:7077
            spark.app.name: My Spark App
            spark.submit.deployMode: cluster
            spark.executor.memory: 4g
            spark.driver.memory: 2g
            spark.driver.cores: '2'
            spark.driver.supervise: 'true'
            spark.eventLog.enabled: 'false'
        environmentVariables:
          type: object
          description: Environment variables to set for the driver process
          additionalProperties:
            type: string
          example:
            SPARK_ENV_LOADED: '1'
    CreateSubmissionResponse:
      type: object
      properties:
        action:
          type: string
          example: CreateSubmissionResponse
        message:
          type: string
          example: Driver successfully submitted as driver-20231124153531-0000
        serverSparkVersion:
          type: string
          example: 4.0.0
        submissionId:
          type: string
          example: driver-20231124153531-0000
        success:
          type: boolean
    SubmissionStatusResponse:
      type: object
      properties:
        action:
          type: string
          example: SubmissionStatusResponse
        driverState:
          type: string
          description: Current state of the driver
          enum:
            - SUBMITTED
            - RUNNING
            - FINISHED
            - RELAUNCHING
            - UNKNOWN
            - KILLED
            - FAILED
            - ERROR
        serverSparkVersion:
          type: string
        submissionId:
          type: string
        success:
          type: boolean
        workerHostPort:
          type: string
          example: 192.168.1.5:38451
        workerId:
          type: string
          example: worker-20231124120000-192.168.1.5-38451
    KillSubmissionResponse:
      type: object
      properties:
        action:
          type: string
          example: KillSubmissionResponse
        message:
          type: string
          example: Kill request for driver-20231124153531-0000 submitted
        serverSparkVersion:
          type: string
        submissionId:
          type: string
        success:
          type: boolean

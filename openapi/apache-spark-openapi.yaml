            - SUCCEEDED
            - FAILED
            - UNKNOWN
        numTasks:
          type: integer
        numActiveTasks:
          type: integer
        numCompletedTasks:
          type: integer
        numSkippedTasks:
          type: integer
        numFailedTasks:
          type: integer
        numKilledTasks:
          type: integer
        numCompletedIndices:
          type: integer
        numActiveStages:

specificationVersion: '0.19'

aid: apache-spark-sandbox
type: Sandbox
visibility: Public

name: Apache Spark REST API Sandbox
description: >-
  This is an Apache Spark sandbox that uses OpenAPI, Microcks, Bruno, and
  Backstage to provide a 3rd-party REST API and MCP sandbox for Apache Spark.

tags:
  - Data Processing
  - Big Data
  - Analytics

image: https://naftiko.github.io/docs/images/monogram/monogram_full_color_512.png

created: '2026-02-26'
modified: '2026-02-26'

url: https://github.com/naftiko/apache-spark-sandbox/blob/main/README.md

apis:

    - aid: apache-spark:rest-api
      name: Apache Spark REST API
      description: >-
        The Apache Spark REST API provides programmatic access to monitor and
        manage Spark applications, jobs, stages, executors, storage, streaming,
        SQL queries, and environment configuration, as well as submit and manage
        jobs on standalone clusters.
      humanURL: https://github.com/naftiko/apache-spark-sandbox
      baseURL: http://localhost:8080/rest/apache-spark-sandbox/1.0.0
      image: https://naftiko.github.io/docs/images/monogram/monogram_full_color_512.png
      tags:
        - Applications
        - Jobs
        - Stages
        - Executors
        - Storage
        - Streaming
        - SQL
      properties:

        - type: OpenAPI
          url: openapi/apache-spark-openapi.yaml
        - type: MockRestServer
          url: http://localhost:8080/rest/apache-spark-api/1.0.0
        - type: MockMCPServer
          url: http://localhost:8080/rest/apache-spark-api/1.0.0/sse
        - type: BackstageApi
          url: backstage/apache-spark-api-sandbox-backstage.yml

